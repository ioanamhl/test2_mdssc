# =============================================================================
#  MDSSC Pipeline Template — pipeline.config.yml
#  Singurul fișier pe care trebuie să îl completezi.
#  Toate celelalte fișiere citesc valorile de aici automat.
# =============================================================================

# ── Identificare proiect ──────────────────────────────────────────────────────
project_name: "my-app"                        # Numele proiectului tău
github_repo: "https://github.com/user/repo"   # URL-ul repo-ului GitHub

# ── Stack aplicație ───────────────────────────────────────────────────────────
stack: "node"                 # node | python | java | go
build_command: "npm run build"
build_output: "dist/"         # Directorul generat la build (ex: dist/, build/)
app_port: 3000                # Portul pe care rulează aplicația

# ── Jenkins ───────────────────────────────────────────────────────────────────
# Jenkins este obligatoriu. Alege modul în funcție de infrastructura ta:
#   "docker"   → Jenkins local via Docker (bun pentru demo/dev)
#   "external" → Jenkins pe VPS propriu (recomandat pentru producție)
jenkins_mode: "docker"

# Adresa unde va fi accesibil Jenkins din exterior
# Completează după ce pornești tunelul (ex: ngrok, cloudflared):
#   cloudflared tunnel --url http://localhost:8080
# Exemplu: "https://abc123.ngrok-free.app"
#           "https://random-words.trycloudflare.com"
jenkins_url: ""
jenkins_port: 8080
jenkins_job: "my-app-pipeline"   # Numele job-ului din Jenkins (creat automat de setup-jenkins.sh)

# ── Deploy ────────────────────────────────────────────────────────────────────
# Cum se face deploy-ul după build:
#   "pm2"      → PM2 process manager (Node.js)
#   "docker"   → docker-compose up
#   "systemd"  → systemctl restart
#   "none"     → fără deploy automat
deploy_method: "pm2"

# ── MDSSC ─────────────────────────────────────────────────────────────────────
# Pragul de severitate sub care build-ul este blocat:
#   "none"     → scanează și raportează, fără a bloca pipeline-ul
#   "critical" → blochează doar la vulnerabilități critice
#   "high"     → blochează la high + critical
#   "medium"   → blochează la medium + high + critical
#   "low"      → blochează la orice vulnerabilitate
mdssc_threshold: "none"
