# =============================================================================
#  MDSSC Pipeline Template — pipeline.config.yml
#  Singurul fișier pe care trebuie să îl completezi.
#  Toate celelalte fișiere citesc valorile de aici automat.
# =============================================================================

# ── Identificare proiect ──────────────────────────────────────────────────────
project_name: "test2-mdssc"
github_repo: "https://github.com/ioanamhl/test2_mdssc"

# ── Stack aplicație ───────────────────────────────────────────────────────────
stack: "node"
backend_dir: "Backend"
frontend_dir: "frontend"
build_command: "npm run build"
build_output: "dist/"
app_port: 5555

# ── Jenkins ───────────────────────────────────────────────────────────────────
jenkins_mode: "docker"

# Completează după ce pornești tunelul cloudflared:
#   cloudflared tunnel --url http://localhost:8080
jenkins_url: "https://summit-star-insights-study.trycloudflare.com"
jenkins_port: 8080
jenkins_job: "test2-mdssc-pipeline"

# ── Deploy ────────────────────────────────────────────────────────────────────
deploy_method: "pm2"
backend_entry: "index.js"

# ── MDSSC ─────────────────────────────────────────────────────────────────────
mdssc_threshold: "none"
